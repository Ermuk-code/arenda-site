<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аренда вещей</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: #f5f7fb; color: #1a2c3e; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
        .header { background: white; border-bottom: 1px solid #e9edf2; padding: 18px 0; position: sticky; top: 0; z-index: 100; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .logo { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #1e3c4c, #2b5c6f); background-clip: text; -webkit-background-clip: text; color: transparent; cursor: pointer; }
        .auth-buttons { display: flex; gap: 12px; align-items: center; }
        .user-info { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .btn-outline { background: transparent; border: 1.5px solid #2b6a7c; padding: 8px 20px; border-radius: 40px; font-weight: 600; color: #2b6a7c; cursor: pointer; text-decoration: none; display: inline-block; transition: 0.2s; }
        .btn-outline:hover { background: #2b6a7c10; }
        .btn-primary { background: #2b6a7c; border: none; padding: 8px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; text-decoration: none; display: inline-block; transition: 0.2s; }
        .btn-primary:hover { background: #1e5668; transform: translateY(-1px); }
        .categories { background: white; border-bottom: 1px solid #eef2f6; padding: 14px 0; }
        .cats-list { display: flex; gap: 28px; flex-wrap: wrap; justify-content: center; list-style: none; }
        .cats-list li { font-weight: 500; color: #2f4f5f; cursor: pointer; transition: 0.2s; padding: 5px 0; }
        .cats-list li.active { color: #1f8a6b; font-weight: 700; border-bottom: 2px solid #1f8a6b; }
        .products { display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; margin: 40px 0; min-height: 400px; }
        .card { background: white; border-radius: 32px; padding: 24px 22px 28px; flex: 1; min-width: 260px; max-width: 320px; box-shadow: 0 12px 28px rgba(0,0,0,0.04); transition: 0.25s; border: 1px solid #eef2f0; text-align: center; position: relative; }
        .card:hover { transform: translateY(-6px); box-shadow: 0 24px 36px rgba(0,0,0,0.08); }
        .card-owner-badge { position: absolute; top: 16px; right: 16px; background: #2b6a7c20; color: #2b6a7c; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .card-image { width: 100%; height: 180px; background: linear-gradient(135deg, #eef2f7, #e0e8ef); border-radius: 24px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-image img { width: 100%; height: 100%; object-fit: cover; }
        .card-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 12px; color: #1c3d48; }
        .card-description { font-size: 0.9rem; color: #6c8b9b; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-price { font-size: 1.8rem; font-weight: 800; color: #2b6a7c; margin: 16px 0; }
        .card-price small { font-size: 0.9rem; font-weight: 500; color: #6f8f9c; }
        .card-btn { background: #f0f4f9; border: none; padding: 12px; width: 100%; border-radius: 60px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 8px; }
        .card-btn:hover { background: #e2e9f0; }
        .card-chat-btn { background: #2b6a7c; color: white; }
        .card-chat-btn:hover { background: #1e5668; }
        .card-delete-btn { background: #fee2e2; color: #c0392b; }
        .card-delete-btn:hover { background: #fccaca; }
        .loading, .empty-message, .error-message { text-align: center; padding: 60px; font-size: 1.1rem; }
        .empty-message { color: #6c8b9b; }
        .error-message { color: #c0392b; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin: 40px 0; }
        .pagination button { padding: 8px 16px; background: white; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }
        .pagination button.active { background: #2b6a7c; color: white; border-color: #2b6a7c; }
        footer { text-align: center; padding: 32px 0; border-top: 1px solid #e2e8f0; color: #6c8b9b; background: white; }

        .create-page, .profile-page, .chats-page, .chat-page { min-height: 80vh; padding: 48px 24px; background: #f5f9fe; }
        .create-card, .profile-card, .chats-card, .chat-card { max-width: 800px; margin: 0 auto; background: white; border-radius: 48px; padding: 40px 32px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1); }
        .create-title, .profile-title, .chats-title, .chat-title { font-size: 2rem; font-weight: 700; margin-bottom: 8px; color: #1a3e4c; }
        .create-sub, .profile-sub, .chats-sub, .chat-sub { color: #6b8b9c; margin-bottom: 32px; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 8px; color: #2c6072; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px 18px; border-radius: 16px; border: 1.5px solid #e2e9ef; font-size: 1rem; transition: 0.2s; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #2b6a7c; }
        .form-actions { display: flex; gap: 12px; margin-top: 32px; }

        .image-preview { margin-top: 16px; display: flex; gap: 16px; flex-wrap: wrap; }
        .preview-item { position: relative; width: 100px; height: 100px; border-radius: 16px; overflow: hidden; border: 2px solid #e2e9ef; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .remove-image { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; }
        .file-input-label { display: inline-block; padding: 12px 20px; background: #f0f4f9; border-radius: 40px; cursor: pointer; font-weight: 500; margin-top: 8px; }
        input[type="file"] { display: none; }

        .auth-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 48px 24px; background: #f5f9fe; }
        .auth-card { max-width: 480px; width: 100%; background: white; border-radius: 48px; padding: 40px 32px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1); }
        .auth-title { font-size: 2rem; font-weight: 700; margin-bottom: 8px; color: #1a3e4c; }
        .auth-sub { color: #6b8b9c; margin-bottom: 32px; }
        .input-group { margin-bottom: 24px; }
        .input-group label { display: block; font-weight: 500; margin-bottom: 8px; color: #2c6072; }
        .input-group input, .input-group select { width: 100%; padding: 14px 18px; border-radius: 60px; border: 1.5px solid #e2e9ef; font-size: 1rem; }
        .auth-btn { width: 100%; background: #2b6a7c; color: white; border: none; padding: 14px; border-radius: 60px; font-weight: 700; font-size: 1.1rem; cursor: pointer; }
        .auth-footer { margin-top: 28px; text-align: center; }
        .auth-footer a { color: #2b6a7c; text-decoration: none; font-weight: 600; }

        .success-message { background: #d4edda; color: #155724; padding: 12px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .error-message-box { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 12px; margin-bottom: 20px; text-align: center; }

        hr { margin: 32px 0; border: none; border-top: 1px solid #e2e9ef; }

        .user-type-info { background: #eef2f7; padding: 16px; border-radius: 16px; margin-top: 16px; }
        .user-type-info h4 { margin-bottom: 12px; color: #1a3e4c; }

        .back-button { margin-bottom: 24px; display: inline-block; cursor: pointer; color: #2b6a7c; font-weight: 500; }
        .back-button:hover { text-decoration: underline; }

        @media (max-width: 720px) { .header-inner { flex-direction: column; } .cats-list { gap: 18px; } .user-info { justify-content: center; } }

        /* ================= Улучшенный UI чата ================= */
        .conversation-list { list-style: none; margin: 20px 0 0; padding: 0; display: flex; flex-direction: column; gap: 12px; }
        .conversation-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 16px;
            border: 1px solid #eef2f6;
            border-radius: 18px;
            cursor: pointer;
            transition: 0.2s;
            background: linear-gradient(180deg, #ffffff, #fbfdff);
        }
        .conversation-item:hover { transform: translateY(-2px); box-shadow: 0 12px 20px rgba(0,0,0,0.05); border-color: #e3ebf2; }
        .conversation-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .avatar {
            width: 44px; height: 44px; border-radius: 50%;
            display: grid; place-items: center;
            background: linear-gradient(135deg, #2b6a7c15, #1f8a6b15);
            border: 1px solid #e7eef5;
            color: #2b6a7c;
            font-weight: 800;
            flex: 0 0 auto;
            user-select: none;
        }
        .conversation-info { min-width: 0; }
        .conversation-info h4 { font-size: 1rem; font-weight: 800; color: #163a45; margin: 0 0 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conversation-info p { margin: 0; color: #6b8b9c; font-size: 0.92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 420px; }
        .conversation-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex: 0 0 auto; }
        .conversation-date { color: #8aa1af; font-size: 0.85rem; }
        .unread-badge {
            background: #1f8a6b;
            color: #fff;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 0.8rem;
            font-weight: 800;
            min-width: 34px;
            text-align: center;
            box-shadow: 0 10px 16px rgba(31,138,107,0.18);
        }

        .chat-card { padding: 0; overflow: hidden; }
        .chat-shell { display: flex; flex-direction: column; height: min(78vh, 760px); }
        .chat-topbar {
            padding: 18px 22px;
            border-bottom: 1px solid #eef2f6;
            background: linear-gradient(180deg, #ffffff, #fbfdff);
        }
        .chat-topbar-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
        .chat-peer { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .chat-peer-text { min-width: 0; }
        .chat-peer-name { font-weight: 900; color: #163a45; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-peer-sub { color: #6b8b9c; font-size: 0.9rem; margin-top: 2px; }
        .chat-actions { display: flex; gap: 10px; align-items: center; }

        .chat-messages {
            flex: 1;
            padding: 18px 18px 10px;
            overflow: auto;
            background:
                radial-gradient(1200px 400px at 20% 0%, #2b6a7c0d, transparent 55%),
                radial-gradient(900px 320px at 90% 20%, #1f8a6b0c, transparent 50%),
                #f6f9fd;
        }

        /* мои сообщения справа / собеседника слева */
        .chat-messages { display: flex; flex-direction: column; gap: 10px; }

        .message-row { display: flex; margin: 4px 0; }
        .message-row.their-message { justify-content: flex-start; }
        .message-row.my-message { justify-content: flex-end; }

        .message {
            max-width: min(560px, 78%);
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
        }
        .message-bubble {
            padding: 10px 12px;
            border-radius: 16px;
            line-height: 1.35;
            font-size: 0.98rem;
            word-break: break-word;
            white-space: pre-wrap;
            border: 1px solid #e7eef5;
            box-shadow: 0 10px 18px rgba(0,0,0,0.04);
        }

        .my-message .message-bubble {
            background: linear-gradient(135deg, #2b6a7c, #1f8a6b);
            color: white;
            border-color: transparent;
            border-bottom-right-radius: 6px;
        }

        .their-message .message-bubble {
            background: #eef2f7;
            color: #14323c;
            border-bottom-left-radius: 6px;
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: flex-end;
            color: #8aa1af;
            font-size: 0.78rem;
        }
        .their-message .message-meta { justify-content: flex-start; }
        .message-time { opacity: 0.9; }

        /* точки непрочитанного */
        .read-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #1f8a6b;
            box-shadow: 0 0 0 3px rgba(31,138,107,0.12);
        }
        .my-message .read-dot {
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.18);
        }

        /* сообщения-картинки */
        .message-image {
            width: 100%;
            max-width: 520px;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #e7eef5;
            box-shadow: 0 10px 18px rgba(0,0,0,0.06);
            background: #fff;
        }
        .message-image img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 380px;
            object-fit: cover;
        }
        .message-image a {
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .chat-input-area {
            padding: 14px 14px;
            border-top: 1px solid #e9edf2;
            background: #ffffff;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .chat-attach-btn {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            border: 1.5px solid #e2e9ef;
            background: #fbfdff;
            cursor: pointer;
            font-size: 18px;
            display: grid;
            place-items: center;
            transition: 0.2s;
            flex: 0 0 auto;
        }
        .chat-attach-btn:hover { border-color: #2b6a7c; box-shadow: 0 0 0 4px rgba(43,106,124,0.08); background: #fff; }

        .chat-input {
            flex: 1;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            padding: 12px 14px;
            border-radius: 18px;
            border: 1.5px solid #e2e9ef;
            outline: none;
            font-size: 1rem;
            line-height: 1.25;
            transition: 0.2s;
            background: #fbfdff;
        }
        .chat-input:focus { border-color: #2b6a7c; box-shadow: 0 0 0 4px rgba(43,106,124,0.08); background: #fff; }

        .chat-send-btn {
            padding: 12px 18px;
            border-radius: 18px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            background: #2b6a7c;
            color: #fff;
            transition: 0.2s;
            min-width: 120px;
        }
        .chat-send-btn:hover { background: #1e5668; transform: translateY(-1px); }

        .chat-attachment-preview {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-top: 1px solid #eef2f6;
            background: #fbfdff;
        }
        .chat-attachment-preview.active { display: flex; }
        .chat-attachment-thumb {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #e7eef5;
            background: #fff;
            flex: 0 0 auto;
        }
        .chat-attachment-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .chat-attachment-meta { min-width: 0; }
        .chat-attachment-title { font-weight: 800; color: #163a45; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 420px; }
        .chat-attachment-sub { color: #8aa1af; font-size: 0.85rem; margin-top: 2px; }
        .chat-attachment-remove {
            margin-left: auto;
            border: none;
            background: #fee2e2;
            color: #c0392b;
            border-radius: 14px;
            padding: 10px 12px;
            cursor: pointer;
            font-weight: 800;
            transition: 0.2s;
        }
        .chat-attachment-remove:hover { background: #fccaca; transform: translateY(-1px); }

        @media (max-width: 720px) {
            .chat-shell { height: 80vh; }
            .conversation-info p { max-width: 210px; }
            .chat-send-btn { min-width: 96px; padding: 12px 14px; }
            .chat-topbar { padding: 16px 16px; }
            .chat-messages { padding: 14px 14px 8px; }
            .chat-attachment-title { max-width: 200px; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const API_BASE = '/api';
        const WS_BASE = 'ws://localhost/ws';

        const CATEGORIES = [
            { id: 'all', name: 'Все' },
            { id: 'electronics', name: 'Электроника' },
            { id: 'tools', name: 'Инструменты' },
            { id: 'sport', name: 'Спорт' },
            { id: 'clothing', name: 'Одежда' },
            { id: 'home', name: 'Дом и сад' }
        ];

        let selectedFiles = [];
        let wsConnection = null;

        // категории из бэка (id+name)
        let serverCategories = null;

        // выбранное изображение для чата (один файл)
        let chatSelectedImageFile = null;
        let chatSelectedImagePreviewUrl = null;

        function getAccessToken() { return localStorage.getItem('access_token'); }
        function getRefreshToken() { return localStorage.getItem('refresh_token'); }

        function setTokens(access, refresh, userId, username, email, userType, profileData) {
            localStorage.setItem('access_token', access);
            if (refresh) localStorage.setItem('refresh_token', refresh);
            if (userId) localStorage.setItem('user_id', userId);
            if (username) localStorage.setItem('username', username);
            if (email) localStorage.setItem('user_email', email);
            if (userType) localStorage.setItem('user_type', userType);

            if (profileData) {
                if (profileData.passport_series) localStorage.setItem('passport_series', profileData.passport_series);
                if (profileData.passport_number) localStorage.setItem('passport_number', profileData.passport_number);
                if (profileData.inn) localStorage.setItem('inn', profileData.inn);
                if (profileData.ogrnip) localStorage.setItem('ogrnip', profileData.ogrnip);
                if (profileData.kpp) localStorage.setItem('kpp', profileData.kpp);
            }
        }

        function clearTokens() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('username');
            localStorage.removeItem('user_id');
            localStorage.removeItem('user_email');
            localStorage.removeItem('user_type');
            localStorage.removeItem('passport_series');
            localStorage.removeItem('passport_number');
            localStorage.removeItem('inn');
            localStorage.removeItem('ogrnip');
            localStorage.removeItem('kpp');
        }

        function isAuthenticated() { return !!getAccessToken(); }

        async function refreshAccessToken() {
            const refresh = getRefreshToken();
            if (!refresh) return false;
            try {
                const response = await fetch(`${API_BASE}/token/refresh/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refresh })
                });
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('access_token', data.access);
                    return true;
                }
            } catch (e) {}
            return false;
        }

        async function apiRequest(endpoint, options = {}) {
            const url = `${API_BASE}${endpoint}`;
            const headers = { ...options.headers };
            const token = getAccessToken();
            if (token) headers['Authorization'] = `Bearer ${token}`;

            if (!(options.body instanceof FormData)) {
                headers['Content-Type'] = 'application/json';
            }

            let response = await fetch(url, { ...options, headers });
            if (response.status === 401 && !options._retry) {
                const refreshed = await refreshAccessToken();
                if (refreshed) {
                    options._retry = true;
                    headers['Authorization'] = `Bearer ${getAccessToken()}`;
                    response = await fetch(url, { ...options, headers });
                }
            }
            return response;
        }

        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

        function getInitials(name) {
            const s = (name || '').trim();
            if (!s) return 'U';
            const parts = s.split(/\s+/).filter(Boolean);
            const first = parts[0]?.[0] || 'U';
            const second = parts[1]?.[0] || '';
            return (first + second).toUpperCase();
        }

        function formatBytes(bytes) {
            if (!bytes && bytes !== 0) return '';
            const units = ['B', 'KB', 'MB', 'GB'];
            let i = 0;
            let n = bytes;
            while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
            return `${n.toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
        }

        async function ensureServerCategoriesLoaded() {
            if (Array.isArray(serverCategories)) return serverCategories;
            try {
                const resp = await apiRequest('/items/categories/');
                if (!resp.ok) { serverCategories = []; return serverCategories; }
                const data = await resp.json();
                serverCategories = Array.isArray(data) ? data : (data.results || []);
            } catch (e) {
                serverCategories = [];
            }
            return serverCategories;
        }

        function resetChatAttachmentPreview() {
            chatSelectedImageFile = null;
            if (chatSelectedImagePreviewUrl) {
                URL.revokeObjectURL(chatSelectedImagePreviewUrl);
                chatSelectedImagePreviewUrl = null;
            }
            const box = document.getElementById('chatAttachmentPreview');
            if (!box) return;
            box.classList.remove('active');
            const img = document.getElementById('chatAttachmentThumbImg');
            if (img) img.src = '';
            const title = document.getElementById('chatAttachmentTitle');
            if (title) title.textContent = '';
            const sub = document.getElementById('chatAttachmentSub');
            if (sub) sub.textContent = '';
        }

        function setChatAttachmentPreview(file) {
            chatSelectedImageFile = file || null;
            const box = document.getElementById('chatAttachmentPreview');
            if (!box) return;

            if (!file) {
                resetChatAttachmentPreview();
                return;
            }

            if (chatSelectedImagePreviewUrl) URL.revokeObjectURL(chatSelectedImagePreviewUrl);
            chatSelectedImagePreviewUrl = URL.createObjectURL(file);

            const img = document.getElementById('chatAttachmentThumbImg');
            if (img) img.src = chatSelectedImagePreviewUrl;

            const title = document.getElementById('chatAttachmentTitle');
            if (title) title.textContent = file.name || 'Изображение';

            const sub = document.getElementById('chatAttachmentSub');
            if (sub) sub.textContent = `${formatBytes(file.size)} • ${file.type || 'image/*'}`;

            box.classList.add('active');
        }

        async function sendChatMessageWithOptionalImage(conversationId, text) {
            const hasText = !!(text || '').trim();
            const hasImage = !!chatSelectedImageFile;

            if (!hasText && !hasImage) return;

            // Если есть изображение — отправляем через HTTP (multipart) на /messages/
            // Бэк сам сделает broadcast в WS-группу, и сообщение появится у всех.
            if (hasImage) {
                const token = getAccessToken();
                const fd = new FormData();
                if (hasText) fd.append('text', (text || '').trim());
                fd.append('image', chatSelectedImageFile);

                const resp = await fetch(`${API_BASE}/chats/conversations/${conversationId}/messages/`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: fd
                });

                const respText = await resp.text().catch(() => '');
                if (!resp.ok) {
                    console.error('❌ chat image upload failed', resp.status, respText);
                    alert(`❌ Не удалось отправить изображение (${resp.status})`);
                    return;
                }

                resetChatAttachmentPreview();
                return;
            }

            // Если только текст — отправляем через WS
            if (wsConnection && wsConnection.readyState === WebSocket.OPEN) {
                wsConnection.send(JSON.stringify({ message: (text || '').trim() }));
                return;
            }

            alert('Нет соединения с сервером');
        }

                    product.images?.[0]?.image ||

                const response = await fetch(`${API_BASE}/items/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(apiData)
                });

                if (!response.ok) {

                    console.error('❌ Ошибка API:', error);
                    alert('❌ Ошибка: ' + JSON.stringify(error));
                    return false;
                }

                const item = await response.json();

                if (images && images.length > 0) {
                    for (const imageFile of images) {

                        imageFormData.append('item', item.id);
                        imageFormData.append('image', imageFile);

        // ========== РЕГИСТРАЦИЯ ==========
        async function register(username, email, password, userType) {
            try {
                const response = await fetch(`${API_BASE}/users/register/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, user_type: userType })
                });

                let responseData;
                const responseText = await response.text();

                try {
                    responseData = JSON.parse(responseText);
                } catch (e) {
                    responseData = { detail: responseText || 'Неизвестная ошибка' };
                }

                if (response.ok) {
                    const loginResponse = await fetch(`${API_BASE}/token/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });

                    if (loginResponse.ok) {
                        const loginData = await loginResponse.json();
                        const payload = JSON.parse(atob(loginData.access.split('.')[1]));
                        const userId = payload.user_id;

                        setTokens(loginData.access, loginData.refresh, userId, username, email, userType);
                        alert('✅ Регистрация успешна! Вы вошли в аккаунт.');
                        showMainPage();
                        loadProducts(1);
                        return true;
                    } else {
                        alert('✅ Регистрация успешна! Теперь войдите с помощью кнопки "Войти".');
                        showLoginPage();
                        return true;
                    }
                } else {
                    let errorMessage = 'Ошибка регистрации:\n';
                    if (responseData.username) errorMessage += `• Имя пользователя: ${Array.isArray(responseData.username) ? responseData.username.join(', ') : responseData.username}\n`;
                    if (responseData.email) errorMessage += `• Email: ${Array.isArray(responseData.email) ? responseData.email.join(', ') : responseData.email}\n`;
                    if (responseData.password) errorMessage += `• Пароль: ${Array.isArray(responseData.password) ? responseData.password.join(', ') : responseData.password}\n`;
                    if (responseData.user_type) errorMessage += `• Тип пользователя: ${Array.isArray(responseData.user_type) ? responseData.user_type.join(', ') : responseData.user_type}\n`;
                    if (responseData.detail) errorMessage += `• ${responseData.detail}\n`;
                    if (errorMessage === 'Ошибка регистрации:\n') errorMessage += `• ${JSON.stringify(responseData)}`;

                    alert(errorMessage);
                    return false;
                }
            } catch (error) {
                console.error('❌ Ошибка подключения:', error);
                alert('❌ Ошибка подключения к серверу. Проверьте, запущен ли сервер.\n\n' + error.message);
                return false;
            }
        }

        // ========== СТРАНИЦА ЧАТА ==========
        async function showChatPage(conversationId) {
            if (!isAuthenticated()) { showLoginPage(); return; }
            const conversationData = await getMessages(conversationId);
            if (!conversationData) { alert('Не удалось загрузить чат'); showChatsPage(); return; }
            await markConversationRead(conversationId);

            resetChatAttachmentPreview();

            const peerName = conversationData.other_user?.username || 'пользователем';
            const peerInitials = getInitials(peerName);

            document.getElementById('app').innerHTML = `
                <div class="chat-page">
                    <div class="chat-card">
                        <div class="chat-shell">
                            <div class="chat-topbar">
                                <div class="chat-topbar-row">
                                    <div class="chat-peer">
                                        <div class="avatar" aria-hidden="true">${peerInitials}</div>
                                        <div class="chat-peer-text">
                                            <div class="chat-peer-name">Чат с ${peerName}</div>
                                            <div class="chat-peer-sub">Enter — отправить • Shift+Enter — новая строка</div>
                                        </div>
                                    </div>
                                    <div class="chat-actions">
                                        <button class="btn-outline" id="backToChatsFromChat">← К чатам</button>
                                    </div>
                                </div>
                            </div>

                            <div class="chat-messages" id="chatMessages">
                                ${renderMessages(conversationData.messages || [])}
                            </div>

                            <div class="chat-attachment-preview" id="chatAttachmentPreview">
                                <div class="chat-attachment-thumb"><img id="chatAttachmentThumbImg" alt="preview"></div>
                                <div class="chat-attachment-meta">
                                    <div class="chat-attachment-title" id="chatAttachmentTitle"></div>
                                    <div class="chat-attachment-sub" id="chatAttachmentSub"></div>
                                </div>
                                <button class="chat-attachment-remove" id="chatAttachmentRemoveBtn" type="button">Убрать</button>
                            </div>

                            <div class="chat-input-area">
                                <button class="chat-attach-btn" id="attachBtn" type="button" title="Прикрепить изображение">📎</button>
                                <input type="file" id="chatImageInput" accept="image/*">
                                <textarea class="chat-input" id="messageInput" placeholder="Введите сообщение..." rows="1"></textarea>
                                <button class="chat-send-btn" id="sendBtn" type="button">Отправить</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const messagesContainer = document.getElementById('chatMessages');
            const attachBtn = document.getElementById('attachBtn');
            const chatImageInput = document.getElementById('chatImageInput');
            const removeAttachBtn = document.getElementById('chatAttachmentRemoveBtn');

            function autosizeTextarea(el) {
                el.style.height = 'auto';
                el.style.height = Math.min(el.scrollHeight, 120) + 'px';
            }
            autosizeTextarea(input);
            input.addEventListener('input', () => autosizeTextarea(input));

            attachBtn.addEventListener('click', () => chatImageInput.click());
            chatImageInput.addEventListener('change', (e) => {
                const file = e.target.files?.[0] || null;
                if (!file) return;

                if (!file.type.startsWith('image/')) {
                    alert('Можно прикрепить только изображение');
                    chatImageInput.value = '';
                    return;
                }

                const maxBytes = 8 * 1024 * 1024; // 8 MB
                if (file.size > maxBytes) {
                    alert('Слишком большой файл. Максимум 8 MB.');
                    chatImageInput.value = '';
                    return;
                }

                setChatAttachmentPreview(file);
            });

            removeAttachBtn.addEventListener('click', () => {
                chatImageInput.value = '';
                resetChatAttachmentPreview();
            });

            window.sendMessage = async () => {
                const text = input.value;
                await sendChatMessageWithOptionalImage(conversationId, text);
                input.value = '';
                autosizeTextarea(input);
                input.focus();
            };

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    window.sendMessage();
                }
            });
            sendBtn.addEventListener('click', () => window.sendMessage());

            const token = getAccessToken();
            const wsUrl = `${WS_BASE}/chat/${conversationId}/?token=${token}`;
            if (wsConnection) wsConnection.close();
            wsConnection = new WebSocket(wsUrl);

            wsConnection.onmessage = (event) => {
                const data = JSON.parse(event.data);
                messagesContainer.insertAdjacentHTML('beforeend', renderSingleMessage(data, data.sender_id == localStorage.getItem('user_id')));
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            };

            document.getElementById('backToChatsFromChat')?.addEventListener('click', () => {
                if (wsConnection) wsConnection.close();
                resetChatAttachmentPreview();
                showChatsPage();
            });

            if (messagesContainer) messagesContainer.scrollTop = messagesContainer.scrollHeight;
            input.focus();
        }

        function renderMessages(messages) {
            const currentUser = localStorage.getItem('user_id');
            return messages.map(msg => renderSingleMessage(msg, msg.sender_id == currentUser)).join('');
        }

        function renderSingleMessage(message, isMyMessage) {
            const time = message?.created_at
                ? new Date(message.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                : '';
            const rowClass = isMyMessage ? 'my-message' : 'their-message';

            const parts = [];

            const safeText = (message?.text || '').trim();
            if (safeText) {
                parts.push(`<div class="message-bubble">${escapeHtml(safeText)}</div>`);
            }

            if (message?.image) {
                const safeUrl = message.image;
                parts.push(`
                    <div class="message-image">
                        <a href="${safeUrl}" target="_blank" rel="noopener">
                            <img src="${safeUrl}" alt="image">
                        </a>
                    </div>
                `);
            }

            if (!parts.length) {
                parts.push(`<div class="message-bubble"></div>`);
            }

            const unreadDot = message && message.is_read === false
                ? `<span class="read-dot" title="Не прочитано"></span>`
                : '';

            return `
                <div class="message-row ${rowClass}">
                    <div class="message ${rowClass}">
                        ${parts.join('')}
                        <div class="message-meta">
                            ${unreadDot}
                            <span class="message-time">${time}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // ========== СТРАНИЦА ПРОФИЛЯ ==========
        async function showProfilePage() {
            if (!isAuthenticated()) { alert('Пожалуйста, войдите в систему'); showLoginPage(); return; }

            let profile = await getUserProfile();
            const userType = profile.user_type || localStorage.getItem('user_type') || 'individual';

            let additionalFields = '';
            if (userType === 'individual') {
                additionalFields = `
                    <div class="user-type-info">
                        <h4>📄 Данные физического лица</h4>
                        <div class="form-group"><label>Серия паспорта</label><input type="text" id="passportSeries" value="${profile.passport_series || ''}" placeholder="Серия паспорта"></div>
                        <div class="form-group"><label>Номер паспорта</label><input type="text" id="passportNumber" value="${profile.passport_number || ''}" placeholder="Номер паспорта"></div>
                        <div class="form-group"><label>ИНН</label><input type="text" id="inn" value="${profile.inn || ''}" placeholder="ИНН"></div>
                    </div>
                `;
            } else if (userType === 'entrepreneur') {
                additionalFields = `
                    <div class="user-type-info">
                        <h4>🏢 Данные ИП</h4>
                        <div class="form-group"><label>ИНН</label><input type="text" id="inn" value="${profile.inn || ''}" placeholder="ИНН"></div>
                        <div class="form-group"><label>ОГРНИП</label><input type="text" id="ogrnip" value="${profile.ogrnip || ''}" placeholder="ОГРНИП"></div>
                    </div>
                `;
            } else if (userType === 'legal') {
                additionalFields = `
                    <div class="user-type-info">
                        <h4>🏛️ Данные юридического лица</h4>
                        <div class="form-group"><label>ИНН</label><input type="text" id="inn" value="${profile.inn || ''}" placeholder="ИНН"></div>
                        <div class="form-group"><label>КПП</label><input type="text" id="kpp" value="${profile.kpp || ''}" placeholder="КПП"></div>
                    </div>
                `;
            }

            document.getElementById('app').innerHTML = `
                <div class="profile-page"><div class="profile-card">
                    <div class="back-button" id="backToMainFromProfile">← Назад</div>
                    <div class="profile-title">👤 Мой профиль</div>
                    <div class="profile-sub">Управление аккаунтом</div>
                    <div id="profileMessage"></div>
                    <form id="profileForm">
                        <div class="form-group"><label>Тип пользователя</label>
                            <select id="profileUserType" disabled>
                                <option value="individual" ${userType === 'individual' ? 'selected' : ''}>🏠 Физическое лицо</option>
                                <option value="entrepreneur" ${userType === 'entrepreneur' ? 'selected' : ''}>🏢 ИП</option>
                                <option value="legal" ${userType === 'legal' ? 'selected' : ''}>🏛️ Юридическое лицо</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Имя пользователя</label><input type="text" id="profileUsername" value="${profile.username || ''}" placeholder="username"></div>
                        <div class="form-group"><label>Email</label><input type="email" id="profileEmail" value="${profile.email || ''}" placeholder="email@example.com"></div>
                        ${additionalFields}
                        <div class="form-actions">
                            <button type="submit" class="btn-primary">💾 Сохранить изменения</button>
                        </div>
                    </form>
                    <hr>
                    <div class="profile-title" style="font-size: 1.5rem;">🔐 Смена пароля</div>
                    <form id="passwordForm">
                        <div class="form-group"><label>Текущий пароль</label><input type="password" id="oldPassword" placeholder="Введите текущий пароль"></div>
                        <div class="form-group"><label>Новый пароль</label><input type="password" id="newPassword" placeholder="Введите новый пароль"></div>
                        <div class="form-group"><label>Подтверждение пароля</label><input type="password" id="confirmPassword" placeholder="Подтвердите новый пароль"></div>
                        <div class="form-actions"><button type="submit" class="btn-primary">🔄 Сменить пароль</button></div>
                    </form>
                </div></div>
            `;

            document.getElementById('profileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const updateData = {
                    user_type: userType,
                    username: document.getElementById('profileUsername').value,
                    email: document.getElementById('profileEmail').value
                };

                if (userType === 'individual') {
                    updateData.passport_series = document.getElementById('passportSeries')?.value || '';
                    updateData.passport_number = document.getElementById('passportNumber')?.value || '';
                    updateData.inn = document.getElementById('inn')?.value || '';
                } else if (userType === 'entrepreneur') {
                    updateData.inn = document.getElementById('inn')?.value || '';
                    updateData.ogrnip = document.getElementById('ogrnip')?.value || '';
                } else if (userType === 'legal') {
                    updateData.inn = document.getElementById('inn')?.value || '';
                    updateData.kpp = document.getElementById('kpp')?.value || '';
                }

                const result = await updateProfile(updateData);
                const msgDiv = document.getElementById('profileMessage');
                if (result.success) {
                    msgDiv.innerHTML = '<div class="success-message">✅ Профиль успешно обновлён!</div>';
                    localStorage.setItem('username', updateData.username);
                    localStorage.setItem('user_email', updateData.email);
                    setTimeout(() => msgDiv.innerHTML = '', 2000);
                    updateNavBar();
                } else {
                    msgDiv.innerHTML = '<div class="error-message-box">❌ Ошибка: ' + JSON.stringify(result.error) + '</div>';
                }
            });

            document.getElementById('passwordForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const msgDiv = document.getElementById('profileMessage');
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (newPassword !== confirmPassword) {
                    msgDiv.innerHTML = '<div class="error-message-box">❌ Пароли не совпадают</div>';
                    return;
                }

                if (newPassword.length < 4) {
                    msgDiv.innerHTML = '<div class="error-message-box">❌ Пароль должен быть не менее 4 символов</div>';
                    return;
                }

                const result = await changePassword(document.getElementById('oldPassword').value, newPassword);
                if (result.success) {
                    msgDiv.innerHTML = '<div class="success-message">✅ Пароль успешно изменён!</div>';
                    document.getElementById('oldPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                    setTimeout(() => msgDiv.innerHTML = '', 2000);
                } else {
                    msgDiv.innerHTML = '<div class="error-message-box">❌ ' + (result.error?.detail || 'Ошибка смены пароля') + '</div>';
                }
            });

            document.getElementById('backToMainFromProfile')?.addEventListener('click', () => showMainPage());
        }

        // ========== СТРАНИЦА СОЗДАНИЯ ОБЪЯВЛЕНИЯ ==========
        async function showCreatePage() {
            if (!isAuthenticated()) { alert('Пожалуйста, войдите в систему'); showLoginPage(); return; }
            selectedFiles = [];

            const categories = await ensureServerCategoriesLoaded();
            const categoryOptions = categories.length
                ? (`<option value="">Без категории</option>` + categories.map(c => `<option value="${c.id}">${c.name}</option>`).join(''))
                : (`<option value="">Без категории</option><option value="" disabled>— Категории не загрузились —</option>`);

            document.getElementById('app').innerHTML = `
                <div class="create-page"><div class="create-card">
                    <div class="back-button" id="backToMainFromCreate">← Назад</div>
                    <div class="create-title">➕ Новое объявление</div>
                    <div class="create-sub">Расскажите о вещи, которую хотите сдать в аренду</div>
                    <form id="createItemForm">
                        <div class="form-group"><label>Название товара *</label><input type="text" id="itemName" placeholder="Например: Дрель Makita" required></div>
                        <div class="form-group"><label>Описание</label><textarea id="itemDesc" rows="4" placeholder="Опишите состояние, характеристики..."></textarea></div>
                        <div class="form-group"><label>Цена за день (₽) *</label><input type="number" id="itemPrice" placeholder="500" required></div>
                        <div class="form-group"><label>Категория</label>
                            <select id="itemCategory">${categoryOptions}</select>
                        </div>
                        <div class="form-group"><label>Фотографии</label>
                            <label class="file-input-label">📷 Выбрать изображения<input type="file" id="itemImages" accept="image/*" multiple></label>
                            <div id="imagePreview" class="image-preview"></div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-primary">📤 Опубликовать</button>
                        </div>
                    </form>
                </div></div>
            `;
            const fileInput = document.getElementById('itemImages');
            fileInput.addEventListener('change', (e) => { selectedFiles = Array.from(e.target.files); updateImagePreview(); });
            document.getElementById('createItemForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = {
                    name: document.getElementById('itemName').value,
                    description: document.getElementById('itemDesc').value,
                    price_per_day: parseInt(document.getElementById('itemPrice').value, 10),
                    category: document.getElementById('itemCategory').value
                };
                if (!formData.name || !formData.price_per_day) { alert('Заполните название и цену'); return; }
                await createItemWithImages(formData, selectedFiles);
            });
            document.getElementById('backToMainFromCreate')?.addEventListener('click', () => showMainPage());
        }

        function updateImagePreview() {
            const container = document.getElementById('imagePreview');
            if (!container) return;
            container.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div'); div.className = 'preview-item';
                    div.innerHTML = `<img src="${e.target.result}"><button class="remove-image" data-index="${index}">×</button>`;
                    container.appendChild(div);
                    div.querySelector('.remove-image').addEventListener('click', () => { selectedFiles.splice(index, 1); updateImagePreview(); });
                };
                reader.readAsDataURL(file);
            });
        }

        // ========== СТРАНИЦА РЕГИСТРАЦИИ ==========
        function showRegisterPage() {
            document.getElementById('app').innerHTML = `
                <div class="auth-page"><div class="auth-card">
                    <div class="back-button" id="backToMainFromRegister">← Назад</div>
                    <div class="auth-title">Регистрация</div>
                    <div class="auth-sub">Создайте новый аккаунт</div>
                    <form id="registerForm">
                        <div class="input-group"><label>Имя пользователя *</label><input type="text" id="regUsername" required></div>
                        <div class="input-group"><label>Email *</label><input type="email" id="regEmail" required></div>
                        <div class="input-group"><label>Пароль *</label><input type="password" id="regPassword" required></div>
                        <div class="input-group"><label>Подтверждение пароля *</label><input type="password" id="regPassword2" required></div>
                        <div class="input-group"><label>Тип пользователя *</label>
                            <select id="regUserType" required>
                                <option value="individual">🏠 Физическое лицо (паспорт + ИНН)</option>
                                <option value="entrepreneur">🏢 ИП (ИНН + ОГРНИП)</option>
                                <option value="legal">🏛️ Юридическое лицо (ИНН + КПП)</option>
                            </select>
                        </div>
                        <button type="submit" class="auth-btn">Зарегистрироваться</button>
                        <div class="auth-footer">Уже есть аккаунт? <a href="#" id="switchToLogin">Войти</a></div>
                    </form>
                </div></div>
            `;
            document.getElementById('registerForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const password = document.getElementById('regPassword').value;
                const password2 = document.getElementById('regPassword2').value;
                if (password !== password2) { alert('❌ Пароли не совпадают'); return; }
                const success = await register(
                    document.getElementById('regUsername').value,
                    document.getElementById('regEmail').value,
                    password,
                    document.getElementById('regUserType').value
                );
                if (success) showMainPage();
            });
            document.getElementById('switchToLogin')?.addEventListener('click', (e) => { e.preventDefault(); showLoginPage(); });
            document.getElementById('backToMainFromRegister')?.addEventListener('click', () => showMainPage());
        }

        // ========== СТРАНИЦА ВХОДА ==========
        function showLoginPage() {
            document.getElementById('app').innerHTML = `
                <div class="auth-page"><div class="auth-card">
                    <div class="back-button" id="backToMainFromLogin">← Назад</div>
                    <div class="auth-title">Войти</div>
                    <div class="auth-sub">Введите свои данные</div>
                    <form id="loginForm">
                        <div class="input-group"><label>Имя пользователя</label><input type="text" id="loginUsername" required></div>
                        <div class="input-group"><label>Пароль</label><input type="password" id="loginPassword" required></div>
                        <button type="submit" class="auth-btn">Войти</button>
                        <div class="auth-footer">Нет аккаунта? <a href="#" id="switchToRegister">Зарегистрироваться</a></div>
                    </form>
                </div></div>
            `;
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const success = await login(document.getElementById('loginUsername').value, document.getElementById('loginPassword').value);
                if (success) { showMainPage(); loadProducts(1); }
            });
            document.getElementById('switchToRegister')?.addEventListener('click', (e) => { e.preventDefault(); showRegisterPage(); });
            document.getElementById('backToMainFromLogin')?.addEventListener('click', () => showMainPage());
        }

        // ========== ГЛАВНАЯ СТРАНИЦА ==========
        function showMainPage() {
            document.getElementById('app').innerHTML = `
                <div class="header"><div class="container header-inner"><span class="logo" id="logoBtn">Аренда вещей</span><div id="authSection" class="auth-buttons"></div></div></div>
                <div class="categories"><div class="container"><ul class="cats-list" id="categoriesList">${CATEGORIES.map(cat => `<li data-category="${cat.id}" class="${cat.id === 'all' ? 'active' : ''}">${cat.name}</li>`).join('')}</ul></div></div>
                <div class="container"><div id="productsContainer" class="products"><div class="loading">Загрузка товаров...</div></div><div id="pagination" class="pagination"></div></div>
                <footer>© Аренда вещей — умная аренда</footer>
            `;
            updateNavBar();
            document.getElementById('logoBtn')?.addEventListener('click', () => showMainPage());
            document.querySelectorAll('.cats-list li').forEach(cat => {
                cat.addEventListener('click', () => {
                    document.querySelectorAll('.cats-list li').forEach(c => c.classList.remove('active'));
                    cat.classList.add('active');
                    currentCategory = cat.dataset.category;
                    loadProducts(1);
                });
            });
            loadProducts(1);
        }

        showMainPage();
    </script>
</body>
