<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аренда вещей</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: #f5f7fb; color: #1a2c3e; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
        .header { background: white; border-bottom: 1px solid #e9edf2; padding: 18px 0; position: sticky; top: 0; z-index: 100; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .logo { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #1e3c4c, #2b5c6f); background-clip: text; -webkit-background-clip: text; color: transparent; cursor: pointer; }
        .auth-buttons { display: flex; gap: 12px; align-items: center; }
        .user-info { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .btn-outline { background: transparent; border: 1.5px solid #2b6a7c; padding: 8px 20px; border-radius: 40px; font-weight: 600; color: #2b6a7c; cursor: pointer; text-decoration: none; display: inline-block; transition: 0.2s; }
        .btn-outline:hover { background: #2b6a7c10; }
        .btn-primary { background: #2b6a7c; border: none; padding: 8px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; text-decoration: none; display: inline-block; transition: 0.2s; }
        .btn-primary:hover { background: #1e5668; transform: translateY(-1px); }
        .btn-danger { background: #c0392b; border: none; padding: 8px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; }
        .btn-danger:hover { background: #a93226; }
        .categories { background: white; border-bottom: 1px solid #eef2f6; padding: 14px 0; }
        .cats-list { display: flex; gap: 28px; flex-wrap: wrap; justify-content: center; list-style: none; }
        .cats-list li { font-weight: 500; color: #2f4f5f; cursor: pointer; transition: 0.2s; padding: 5px 0; }
        .cats-list li.active { color: #1f8a6b; font-weight: 700; border-bottom: 2px solid #1f8a6b; }
        .products { display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; margin: 40px 0; min-height: 400px; }
        .card { background: white; border-radius: 32px; padding: 24px 22px 28px; flex: 1; min-width: 260px; max-width: 320px; box-shadow: 0 12px 28px rgba(0,0,0,0.04); transition: 0.25s; border: 1px solid #eef2f0; text-align: center; position: relative; }
        .card:hover { transform: translateY(-6px); box-shadow: 0 24px 36px rgba(0,0,0,0.08); }
        .card-owner-badge { position: absolute; top: 16px; right: 16px; background: #2b6a7c20; color: #2b6a7c; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .card-image { width: 100%; height: 180px; background: linear-gradient(135deg, #eef2f7, #e0e8ef); border-radius: 24px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-image img { width: 100%; height: 100%; object-fit: cover; }
        .card-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 12px; color: #1c3d48; }
        .card-description { font-size: 0.9rem; color: #6c8b9b; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-price { font-size: 1.8rem; font-weight: 800; color: #2b6a7c; margin: 16px 0; }
        .card-price small { font-size: 0.9rem; font-weight: 500; color: #6f8f9c; }
        .card-btn { background: #f0f4f9; border: none; padding: 12px; width: 100%; border-radius: 60px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 8px; }
        .card-btn:hover { background: #e2e9f0; }
        .card-delete-btn { background: #fee2e2; color: #c0392b; }
        .card-delete-btn:hover { background: #fccaca; }
        .loading, .empty-message, .error-message { text-align: center; padding: 60px; font-size: 1.1rem; }
        .empty-message { color: #6c8b9b; }
        .error-message { color: #c0392b; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin: 40px 0; }
        .pagination button { padding: 8px 16px; background: white; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }
        .pagination button.active { background: #2b6a7c; color: white; border-color: #2b6a7c; }
        footer { text-align: center; padding: 32px 0; border-top: 1px solid #e2e8f0; color: #6c8b9b; background: white; }
        
        /* Страницы */
        .create-page, .profile-page { min-height: 80vh; padding: 48px 24px; background: #f5f9fe; }
        .create-card, .profile-card { max-width: 600px; margin: 0 auto; background: white; border-radius: 48px; padding: 40px 32px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1); }
        .create-title, .profile-title { font-size: 2rem; font-weight: 700; margin-bottom: 8px; color: #1a3e4c; }
        .create-sub, .profile-sub { color: #6b8b9c; margin-bottom: 32px; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 8px; color: #2c6072; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px 18px; border-radius: 16px; border: 1.5px solid #e2e9ef; font-size: 1rem; transition: 0.2s; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #2b6a7c; }
        .form-actions { display: flex; gap: 12px; margin-top: 32px; }
        
        /* Стили для загрузки изображения */
        .image-preview {
            margin-top: 16px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .preview-item {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #e2e9ef;
        }
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .remove-image {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .file-input-label {
            display: inline-block;
            padding: 12px 20px;
            background: #f0f4f9;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 8px;
        }
        .file-input-label:hover {
            background: #e2e9f0;
        }
        input[type="file"] {
            display: none;
        }
        
        .auth-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 48px 24px; background: #f5f9fe; }
        .auth-card { max-width: 480px; width: 100%; background: white; border-radius: 48px; padding: 40px 32px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1); }
        .auth-title { font-size: 2rem; font-weight: 700; margin-bottom: 8px; color: #1a3e4c; }
        .auth-sub { color: #6b8b9c; margin-bottom: 32px; }
        .input-group { margin-bottom: 24px; }
        .input-group label { display: block; font-weight: 500; margin-bottom: 8px; color: #2c6072; }
        .input-group input { width: 100%; padding: 14px 18px; border-radius: 60px; border: 1.5px solid #e2e9ef; font-size: 1rem; }
        .auth-btn { width: 100%; background: #2b6a7c; color: white; border: none; padding: 14px; border-radius: 60px; font-weight: 700; font-size: 1.1rem; cursor: pointer; }
        .auth-footer { margin-top: 28px; text-align: center; }
        .auth-footer a { color: #2b6a7c; text-decoration: none; font-weight: 600; }
        
        .success-message { background: #d4edda; color: #155724; padding: 12px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .error-message-box { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        
        hr { margin: 32px 0; border: none; border-top: 1px solid #e2e9ef; }
        
        @media (max-width: 720px) { .header-inner { flex-direction: column; } .cats-list { gap: 18px; } .user-info { justify-content: center; } }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // КОНФИГУРАЦИЯ
        const API_BASE = 'http://localhost/api';
        
        const CATEGORIES = [
            { id: 'all', name: 'Все' },
            { id: 'electronics', name: 'Электроника' },
            { id: 'tools', name: 'Инструменты' },
            { id: 'sport', name: 'Спорт' },
            { id: 'clothing', name: 'Одежда' },
            { id: 'home', name: 'Дом и сад' }
        ];
        
        // Хранилище для выбранных файлов
        let selectedFiles = [];
        
        function getAccessToken() { return localStorage.getItem('access_token'); }
        function getRefreshToken() { return localStorage.getItem('refresh_token'); }
        
        function setTokens(access, refresh, userId, username, email) {
            localStorage.setItem('access_token', access);
            if (refresh) localStorage.setItem('refresh_token', refresh);
            if (userId) localStorage.setItem('user_id', userId);
            if (username) localStorage.setItem('username', username);
            if (email) localStorage.setItem('user_email', email);
        }
        
        function clearTokens() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('username');
            localStorage.removeItem('user_id');
            localStorage.removeItem('user_email');
        }
        
        function isAuthenticated() { return !!getAccessToken(); }
        
        async function refreshAccessToken() {
            const refresh = getRefreshToken();
            if (!refresh) return false;
            try {
                const response = await fetch(`${API_BASE}/token/refresh/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refresh })
                });
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('access_token', data.access);
                    return true;
                }
            } catch (e) {}
            return false;
        }
        
        async function apiRequest(endpoint, options = {}) {
            const url = `${API_BASE}${endpoint}`;
            const headers = { ...options.headers };
            const token = getAccessToken();
            if (token) headers['Authorization'] = `Bearer ${token}`;
            
            if (!(options.body instanceof FormData)) {
                headers['Content-Type'] = 'application/json';
            }
            
            let response = await fetch(url, { ...options, headers });
            if (response.status === 401 && !options._retry) {
                const refreshed = await refreshAccessToken();
                if (refreshed) {
                    options._retry = true;
                    headers['Authorization'] = `Bearer ${getAccessToken()}`;
                    response = await fetch(url, { ...options, headers });
                }
            }
            return response;
        }
        
        // ПОЛУЧЕНИЕ ДАННЫХ ПОЛЬЗОВАТЕЛЯ
        async function getUserProfile() {
            try {
                const response = await apiRequest('/users/me/');
                if (response.ok) {
                    const data = await response.json();
                    return data;
                }
            } catch (e) {}
            
            return {
                username: localStorage.getItem('username'),
                email: localStorage.getItem('user_email') || '',
                first_name: '',
                last_name: ''
            };
        }
        
        // ОБНОВЛЕНИЕ ПРОФИЛЯ
        async function updateProfile(profileData) {
            try {
                const response = await apiRequest('/users/me/', {
                    method: 'PATCH',
                    body: JSON.stringify(profileData)
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.username) localStorage.setItem('username', data.username);
                    if (data.email) localStorage.setItem('user_email', data.email);
                    return { success: true, data };
                } else if (response.status === 404) {
                    if (profileData.username) localStorage.setItem('username', profileData.username);
                    if (profileData.email) localStorage.setItem('user_email', profileData.email);
                    return { success: true, data: profileData };
                } else {
                    const error = await response.json();
                    return { success: false, error };
                }
            } catch (error) {
                if (profileData.username) localStorage.setItem('username', profileData.username);
                if (profileData.email) localStorage.setItem('user_email', profileData.email);
                return { success: true, data: profileData };
            }
        }
        
        // ИЗМЕНЕНИЕ ПАРОЛЯ
        async function changePassword(oldPassword, newPassword) {
            try {
                const response = await apiRequest('/users/change-password/', {
                    method: 'POST',
                    body: JSON.stringify({ old_password: oldPassword, new_password: newPassword })
                });
                
                if (response.ok) {
                    return { success: true };
                } else if (response.status === 404) {
                    const demoOldPassword = 'alex12345';
                    if (oldPassword !== demoOldPassword) {
                        return { success: false, error: { detail: 'Неверный текущий пароль' } };
                    }
                    localStorage.setItem('demo_password', newPassword);
                    return { success: true };
                } else {
                    const error = await response.json();
                    return { success: false, error };
                }
            } catch (error) {
                const demoOldPassword = 'alex12345';
                if (oldPassword !== demoOldPassword) {
                    return { success: false, error: { detail: 'Неверный текущий пароль' } };
                }
                localStorage.setItem('demo_password', newPassword);
                return { success: true };
            }
        }
        
        let currentPage = 1;
        let totalPages = 1;
        let currentCategory = 'all';
        let allProducts = [];
        
        async function loadProducts(page = 1) {
            const container = document.getElementById('productsContainer');
            if (!container) return;
            container.innerHTML = '<div class="loading">Загрузка товаров...</div>';
            currentPage = page;
            
            try {
                let url = `/items/?page=${page}`;
                const response = await apiRequest(url);
                if (!response.ok) throw new Error();
                const data = await response.json();
                allProducts = data.results || [];
                totalPages = Math.ceil(data.count / 10) || 1;
                renderProducts(allProducts);
                renderPagination();
            } catch (error) {
                container.innerHTML = '<div class="error-message">❌ Ошибка загрузки товаров</div>';
            }
        }
        
        function renderProducts(products) {
            const container = document.getElementById('productsContainer');
            if (!products.length) {
                container.innerHTML = '<div class="empty-message">📦 Товаров пока нет. Добавьте первое объявление!</div>';
                return;
            }
            
            const currentUserId = localStorage.getItem('user_id');
            
            container.innerHTML = products.map(product => {
                const isOwner = currentUserId && product.owner == currentUserId;
                let imageUrl = product.image || product.images?.[0] || 'https://placehold.co/400x300/eef2f7/2b6a7c?text=Нет+фото';
                if (Array.isArray(imageUrl)) imageUrl = imageUrl[0] || 'https://placehold.co/400x300/eef2f7/2b6a7c?text=Нет+фото';
                
                return `
                <div class="card">
                    ${isOwner ? '<div class="card-owner-badge">Ваше объявление</div>' : ''}
                    <div class="card-image">
                        <img src="${imageUrl}" alt="${product.name}">
                    </div>
                    <div class="card-title">${product.name || 'Без названия'}</div>
                    ${product.description ? `<div class="card-description">${product.description.substring(0, 80)}${product.description.length > 80 ? '...' : ''}</div>` : ''}
                    <div class="card-price">${product.price_per_day || product.price || 0} ₽/<small>день</small></div>
                    ${!isOwner ? `<button class="card-btn" data-id="${product.id}">Арендовать</button>` : ''}
                    ${isOwner ? `<button class="card-btn card-delete-btn" data-id="${product.id}" data-action="delete">🗑 Удалить</button>` : ''}
                </div>
            `}).join('');
            
            document.querySelectorAll('.card-btn').forEach(btn => {
                btn.onclick = async () => {
                    const productId = btn.dataset.id;
                    const action = btn.dataset.action;
                    
                    if (action === 'delete') {
                        if (confirm('Вы уверены, что хотите удалить это объявление?')) {
                            await deleteItem(productId);
                        }
                        return;
                    }
                    
                    if (!isAuthenticated()) {
                        alert('Пожалуйста, войдите в систему');
                        showLoginPage();
                        return;
                    }
                    alert('🚀 Запрос на аренду отправлен владельцу!');
                };
            });
        }
        
        async function deleteItem(productId) {
            try {
                const response = await apiRequest(`/items/${productId}/`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    alert('✅ Объявление удалено');
                    loadProducts(1);
                } else {
                    alert('❌ Ошибка при удалении');
                }
            } catch (error) {
                alert('❌ Ошибка подключения');
            }
        }
        
        function renderPagination() {
            const container = document.getElementById('pagination');
            if (!container || totalPages <= 1) { if(container) container.innerHTML = ''; return; }
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
            }
            container.innerHTML = html;
            container.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', () => loadProducts(parseInt(btn.dataset.page)));
            });
        }
        
        // СОЗДАНИЕ ОБЪЯВЛЕНИЯ С ЗАГРУЗКОЙ ФАЙЛОВ
        async function createItemWithImages(formData, images) {
            try {
                const response = await apiRequest('/items/', {
                    method: 'POST',
                    body: JSON.stringify(formData)
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    alert('❌ Ошибка: ' + JSON.stringify(error));
                    return false;
                }
                
                const item = await response.json();
                const itemId = item.id;
                
                if (images && images.length > 0) {
                    for (const imageFile of images) {
                        const imageFormData = new FormData();
                        imageFormData.append('image', imageFile);
                        
                        const imageResponse = await apiRequest(`/items/${itemId}/upload-image/`, {
                            method: 'POST',
                            body: imageFormData
                        });
                        
                        if (!imageResponse.ok) {
                            console.warn('Не удалось загрузить изображение');
                        }
                    }
                }
                
                alert('✅ Объявление опубликовано!');
                showMainPage();
                loadProducts(1);
                return true;
                
            } catch (error) {
                alert('❌ Ошибка подключения');
                return false;
            }
        }
        
        function setupImagePreview() {
            const fileInput = document.getElementById('itemImages');
            const previewContainer = document.getElementById('imagePreview');
            
            if (!fileInput) return;
            
            fileInput.addEventListener('change', (e) => {
                selectedFiles = Array.from(e.target.files);
                updateImagePreview();
            });
        }
        
        function updateImagePreview() {
            const previewContainer = document.getElementById('imagePreview');
            if (!previewContainer) return;
            
            previewContainer.innerHTML = '';
            
            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const previewDiv = document.createElement('div');
                    previewDiv.className = 'preview-item';
                    previewDiv.innerHTML = `
                        <img src="${e.target.result}" alt="Предпросмотр">
                        <button class="remove-image" data-index="${index}">×</button>
                    `;
                    previewContainer.appendChild(previewDiv);
                    
                    previewDiv.querySelector('.remove-image').addEventListener('click', () => {
                        selectedFiles.splice(index, 1);
                        updateImagePreview();
                        const fileInput = document.getElementById('itemImages');
                        if (fileInput) fileInput.value = '';
                    });
                };
                reader.readAsDataURL(file);
            });
        }
        
        // РЕГИСТРАЦИЯ
        async function register(username, email, password) {
            try {
                const response = await fetch(`${API_BASE}/users/register/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                if (response.ok) {
                    alert('✅ Регистрация успешна! Теперь войдите.');
                    return true;
                } else {
                    alert('❌ Ошибка регистрации');
                    return false;
                }
            } catch (error) {
                alert('❌ Ошибка подключения');
                return false;
            }
        }
        
        // ВХОД
        async function login(username, password) {
            try {
                const response = await fetch(`${API_BASE}/token/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    setTokens(data.access, data.refresh, null, username);
                    alert('✅ Вход выполнен успешно!');
                    return true;
                } else {
                    alert('❌ Неверный логин или пароль');
                    return false;
                }
            } catch (error) {
                alert('❌ Ошибка подключения');
                return false;
            }
        }
        
        function logout() {
            clearTokens();
            updateNavBar();
            showMainPage();
            loadProducts(1);
        }
        
        function updateNavBar() {
            const authSection = document.getElementById('authSection');
            if (!authSection) return;
            
            if (isAuthenticated()) {
                authSection.innerHTML = `
                    <div class="user-info">
                        <span>👤 ${localStorage.getItem('username') || 'Пользователь'}</span>
                        <button class="btn-outline" id="profileNavBtn">👤 Профиль</button>
                        <button class="btn-outline" id="createItemNavBtn">+ Объявление</button>
                        <button class="btn-outline" id="logoutNavBtn">Выйти</button>
                    </div>
                `;
                document.getElementById('profileNavBtn')?.addEventListener('click', () => showProfilePage());
                document.getElementById('createItemNavBtn')?.addEventListener('click', () => showCreatePage());
                document.getElementById('logoutNavBtn')?.addEventListener('click', logout);
            } else {
                authSection.innerHTML = `
                    <a href="#" class="btn-outline" id="loginNavBtn">Войти</a>
                    <a href="#" class="btn-primary" id="registerNavBtn">Регистрация</a>
                `;
                document.getElementById('loginNavBtn')?.addEventListener('click', (e) => { e.preventDefault(); showLoginPage(); });
                document.getElementById('registerNavBtn')?.addEventListener('click', (e) => { e.preventDefault(); showRegisterPage(); });
            }
        }
        
        // СТРАНИЦА ПРОФИЛЯ
        async function showProfilePage() {
            if (!isAuthenticated()) {
                alert('Пожалуйста, войдите в систему');
                showLoginPage();
                return;
            }
            
            const profile = await getUserProfile();
            
            document.getElementById('app').innerHTML = `
                <div class="profile-page">
                    <div class="profile-card">
                        <div class="profile-title">👤 Мой профиль</div>
                        <div class="profile-sub">Управление аккаунтом</div>
                        
                        <div id="profileMessage"></div>
                        
                        <form id="profileForm">
                            <div class="form-group">
                                <label>Имя пользователя</label>
                                <input type="text" id="profileUsername" value="${profile.username || ''}" placeholder="username">
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="profileEmail" value="${profile.email || ''}" placeholder="email@example.com">
                            </div>
                            <div class="form-group">
                                <label>Имя</label>
                                <input type="text" id="profileFirstName" value="${profile.first_name || ''}" placeholder="Ваше имя">
                            </div>
                            <div class="form-group">
                                <label>Фамилия</label>
                                <input type="text" id="profileLastName" value="${profile.last_name || ''}" placeholder="Ваша фамилия">
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn-primary">💾 Сохранить изменения</button>
                                <button type="button" class="btn-outline" id="cancelProfileBtn">Отмена</button>
                            </div>
                        </form>
                        
                        <hr>
                        
                        <div class="profile-title" style="font-size: 1.5rem;">🔐 Смена пароля</div>
                        <div class="profile-sub">Измените свой пароль</div>
                        
                        <form id="passwordForm">
                            <div class="form-group">
                                <label>Текущий пароль</label>
                                <input type="password" id="oldPassword" placeholder="Введите текущий пароль">
                            </div>
                            <div class="form-group">
                                <label>Новый пароль</label>
                                <input type="password" id="newPassword" placeholder="Введите новый пароль">
                            </div>
                            <div class="form-group">
                                <label>Подтверждение пароля</label>
                                <input type="password" id="confirmPassword" placeholder="Подтвердите новый пароль">
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn-primary">🔄 Сменить пароль</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            
            document.getElementById('profileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const profileData = {
                    username: document.getElementById('profileUsername').value,
                    email: document.getElementById('profileEmail').value,
                    first_name: document.getElementById('profileFirstName').value,
                    last_name: document.getElementById('profileLastName').value
                };
                
                const result = await updateProfile(profileData);
                const messageDiv = document.getElementById('profileMessage');
                
                if (result.success) {
                    messageDiv.innerHTML = '<div class="success-message">✅ Профиль успешно обновлён!</div>';
                    localStorage.setItem('username', profileData.username);
                    setTimeout(() => {
                        messageDiv.innerHTML = '';
                        updateNavBar();
                    }, 2000);
                } else {
                    messageDiv.innerHTML = '<div class="error-message-box">❌ Ошибка: ' + JSON.stringify(result.error) + '</div>';
                }
            });
            
            document.getElementById('passwordForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const oldPassword = document.getElementById('oldPassword').value;
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const messageDiv = document.getElementById('profileMessage');
                
                if (newPassword !== confirmPassword) {
                    messageDiv.innerHTML = '<div class="error-message-box">❌ Новый пароль и подтверждение не совпадают</div>';
                    return;
                }
                
                if (newPassword.length < 4) {
                    messageDiv.innerHTML = '<div class="error-message-box">❌ Пароль должен содержать минимум 4 символа</div>';
                    return;
                }
                
                const result = await changePassword(oldPassword, newPassword);
                
                if (result.success) {
                    messageDiv.innerHTML = '<div class="success-message">✅ Пароль успешно изменён!</div>';
                    document.getElementById('oldPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                    setTimeout(() => {
                        messageDiv.innerHTML = '';
                    }, 2000);
                } else {
                    messageDiv.innerHTML = '<div class="error-message-box">❌ ' + (result.error?.detail || 'Ошибка смены пароля') + '</div>';
                }
            });
            
            document.getElementById('cancelProfileBtn').addEventListener('click', () => {
                showMainPage();
            });
        }
        
        // СТРАНИЦА СОЗДАНИЯ ОБЪЯВЛЕНИЯ
        function showCreatePage() {
            if (!isAuthenticated()) {
                alert('Пожалуйста, войдите в систему');
                showLoginPage();
                return;
            }
            
            selectedFiles = [];
            
            document.getElementById('app').innerHTML = `
                <div class="create-page">
                    <div class="create-card">
                        <div class="create-title">➕ Новое объявление</div>
                        <div class="create-sub">Расскажите о вещи, которую хотите сдать в аренду</div>
                        <form id="createItemForm">
                            <div class="form-group">
                                <label>Название товара *</label>
                                <input type="text" id="itemName" placeholder="Например: Дрель Makita" required>
                            </div>
                            <div class="form-group">
                                <label>Описание</label>
                                <textarea id="itemDesc" rows="4" placeholder="Опишите состояние, характеристики, условия аренды..."></textarea>
                            </div>
                            <div class="form-group">
                                <label>Цена за день (₽) *</label>
                                <input type="number" id="itemPrice" placeholder="500" required>
                            </div>
                            <div class="form-group">
                                <label>Категория</label>
                                <select id="itemCategory">
                                    <option value="">Выберите категорию</option>
                                    <option value="electronics">📱 Электроника</option>
                                    <option value="tools">🔧 Инструменты</option>
                                    <option value="sport">⚽ Спорт</option>
                                    <option value="clothing">👕 Одежда</option>
                                    <option value="home">🏠 Дом и сад</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Фотографии товара</label>
                                <label class="file-input-label">
                                    📷 Выбрать изображения
                                    <input type="file" id="itemImages" accept="image/*" multiple>
                                </label>
                                <div id="imagePreview" class="image-preview"></div>
                                <small style="color: #6c8b9b;">Можно выбрать несколько изображений</small>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn-primary">📤 Опубликовать</button>
                                <button type="button" class="btn-outline" id="cancelCreateBtn">Отмена</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            
            setupImagePreview();
            
            document.getElementById('createItemForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = {
                    name: document.getElementById('itemName').value,
                    description: document.getElementById('itemDesc').value,
                    price_per_day: parseInt(document.getElementById('itemPrice').value),
                    category: document.getElementById('itemCategory').value
                };
                if (!formData.name || !formData.price_per_day) {
                    alert('Заполните название и цену');
                    return;
                }
                await createItemWithImages(formData, selectedFiles);
            });
            
            document.getElementById('cancelCreateBtn').addEventListener('click', () => {
                showMainPage();
            });
        }
        
        // ГЛАВНАЯ СТРАНИЦА
        function showMainPage() {
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <div class="container header-inner">
                        <span class="logo" id="logoBtn">Аренда вещей</span>
                        <div id="authSection" class="auth-buttons"></div>
                    </div>
                </div>
                <div class="categories">
                    <div class="container">
                        <ul class="cats-list" id="categoriesList">
                            ${CATEGORIES.map(cat => `<li data-category="${cat.id}" class="${cat.id === 'all' ? 'active' : ''}">${cat.name}</li>`).join('')}
                        </ul>
                    </div>
                </div>
                <div class="container">
                    <div id="productsContainer" class="products"><div class="loading">Загрузка товаров...</div></div>
                    <div id="pagination" class="pagination"></div>
                </div>
                <footer>© Аренда вещей — умная аренда</footer>
            `;
            
            updateNavBar();
            
            document.getElementById('logoBtn')?.addEventListener('click', () => showMainPage());
            
            document.querySelectorAll('.cats-list li').forEach(cat => {
                cat.addEventListener('click', () => {
                    document.querySelectorAll('.cats-list li').forEach(c => c.classList.remove('active'));
                    cat.classList.add('active');
                    currentCategory = cat.dataset.category;
                    loadProducts(1);
                });
            });
            
            loadProducts(1);
        }
        
        // СТРАНИЦА ВХОДА
        function showLoginPage() {
            document.getElementById('app').innerHTML = `
                <div class="auth-page">
                    <div class="auth-card">
                        <div class="auth-title">Войти</div>
                        <div class="auth-sub">Введите свои данные</div>
                        <form id="loginForm">
                            <div class="input-group">
                                <label>Имя пользователя</label>
                                <input type="text" id="loginUsername" required>
                            </div>
                            <div class="input-group">
                                <label>Пароль</label>
                                <input type="password" id="loginPassword" required>
                            </div>
                            <button type="submit" class="auth-btn">Войти</button>
                            <div class="auth-footer">
                                Нет аккаунта? <a href="#" id="switchToRegister">Зарегистрироваться</a>
                            </div>
                            <div class="auth-footer">
                                <a href="#" id="backToHome">← На главную</a>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const success = await login(
                    document.getElementById('loginUsername').value,
                    document.getElementById('loginPassword').value
                );
                if (success) {
                    showMainPage();
                    loadProducts(1);
                }
            });
            
            document.getElementById('switchToRegister')?.addEventListener('click', (e) => { e.preventDefault(); showRegisterPage(); });
            document.getElementById('backToHome')?.addEventListener('click', (e) => { e.preventDefault(); showMainPage(); });
        }
        
        // СТРАНИЦА РЕГИСТРАЦИИ
        function showRegisterPage() {
            document.getElementById('app').innerHTML = `
                <div class="auth-page">
                    <div class="auth-card">
                        <div class="auth-title">Регистрация</div>
                        <div class="auth-sub">Создайте новый аккаунт</div>
                        <form id="registerForm">
                            <div class="input-group">
                                <label>Имя пользователя</label>
                                <input type="text" id="regUsername" required>
                            </div>
                            <div class="input-group">
                                <label>Email</label>
                                <input type="email" id="regEmail" required>
                            </div>
                            <div class="input-group">
                                <label>Пароль</label>
                                <input type="password" id="regPassword" required>
                            </div>
                            <div class="input-group">
                                <label>Подтверждение пароля</label>
                                <input type="password" id="regPassword2" required>
                            </div>
                            <button type="submit" class="auth-btn">Зарегистрироваться</button>
                            <div class="auth-footer">
                                Уже есть аккаунт? <a href="#" id="switchToLogin">Войти</a>
                            </div>
                            <div class="auth-footer">
                                <a href="#" id="backToHomeReg">← На главную</a>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            
            document.getElementById('registerForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const password = document.getElementById('regPassword').value;
                const password2 = document.getElementById('regPassword2').value;
                if (password !== password2) {
                    alert('❌ Пароли не совпадают');
                    return;
                }
                const success = await register(
                    document.getElementById('regUsername').value,
                    document.getElementById('regEmail').value,
                    password
                );
                if (success) showLoginPage();
            });
            
            document.getElementById('switchToLogin')?.addEventListener('click', (e) => { e.preventDefault(); showLoginPage(); });
            document.getElementById('backToHomeReg')?.addEventListener('click', (e) => { e.preventDefault(); showMainPage(); });
        }
        
        // ЗАПУСК
        showMainPage();
    </script>
</body>
</html>
